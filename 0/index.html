<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал рубежных оценок (РО)</title>
    <link rel="stylesheet" href="style.css" id="themeStylesheet">
</head>
<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h1 id="mainTitle">📊 Журнал рубежных оценок (РО)</h1>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <div class="language-switcher">
                    <button id="langRuBtn" class="lang-btn active" onclick="setLanguage('ru')">🇷🇺 Русский</button>
                    <button id="langKzBtn" class="lang-btn" onclick="setLanguage('kz')">🇰🇿 Қазақша</button>
                </div>
                <div class="theme-switcher">
                    <button onclick="setTheme('win2k')" id="themeWin2k" class="theme-btn">🪟 2000</button>
                    <button onclick="setTheme('winxp')" id="themeWinXp" class="theme-btn">🪟 XP</button>
                    <button onclick="setTheme('vista')" id="themeVista" class="theme-btn">🪟 Vista</button>
                    <button onclick="setTheme('win7')" id="themeWin7" class="theme-btn">🪟 7</button>
                    <button onclick="setTheme('win81')" id="themeWin81" class="theme-btn">🪟 8.1</button>
                    <button onclick="setTheme('win10')" id="themeWin10" class="theme-btn">🪟 10</button>
                    <button onclick="setTheme('macos9')" id="themeMacOs9" class="theme-btn">🍎 OS 9</button>
                    <button onclick="setTheme('macosx')" id="themeMacOsX" class="theme-btn">💎 OS X</button>
                    <button onclick="setTheme('ribbon')" id="themeRibbon" class="theme-btn">📎 Office 2010</button>
            </div>
            </div>
        </div>
        <div class="controls">
            <div class="group-selector">
                <label id="groupLabel">📁 Группа:</label>
                <select id="groupSelect" onchange="switchGroup()"></select>
                <button onclick="openGroupModal()" id="newGroupBtn">➕ Новая</button>
                <button onclick="renameCurrentGroup()" id="renameGroupBtn">✏️</button>
                <button onclick="deleteCurrentGroup()" id="deleteGroupBtn">🗑️</button>
            </div>
            <div class="ro-selector">
                <label id="roCountLabel">РО в семестре:</label>
                <input type="number" id="roCount" min="1" max="20" value="4" onchange="initApp()">
            </div>
        </div>
        <div class="info-bar" id="infoBar" style="display: none;">
            <div id="studentCount"></div>
            <div class="info-bar-actions">
                <input type="file" id="txtFileInput" accept=".txt" style="display: none;" onchange="loadStudentsFromBrowser(event)">
                <button onclick="document.getElementById('txtFileInput').click()" id="loadListBtn">📁 Загрузить список</button>
                <button onclick="openAddStudentModal()" id="addStudentBtn">➕ Добавить студента</button>
                <button onclick="exportToExcel()" class="excel-btn" id="exportExcelBtn">📊 Экспорт в Excel</button>
                <button onclick="showInstructions()" id="instructionsBtn">❓ Инструкция</button>
                <button onclick="manualSave()" id="saveBtn">💾 Сохранить</button>
                <button onclick="quickVoiceInput()" id="quickVoiceBtn">🎤 Быстрый ввод</button>
                <button onclick="exportBackup()" id="backupBtn">📥 Бэкап</button>
                <button onclick="importBackup()" id="restoreBtn">📂 Восстановить</button>
                <button onclick="resetAllData()" class="reset-btn" id="resetBtn">🗑️ Сброс</button>
            </div>
        </div>
    </div>

    <div class="tabs-header" id="tabsHeader"></div>
    <div id="tabsContent"></div>

    <!-- Голосовая панель -->
    <div id="voicePanel" class="voice-panel" style="display: none;">
        <div class="voice-panel-content">
            <div class="voice-status">
                <div class="voice-icon">🎤</div>
                <div id="voiceStatusText">Нажмите для голосового ввода</div>
            </div>
            <div class="voice-buttons">
                <button onclick="startVoiceInput()" id="voiceStartBtn" class="voice-start-btn">🎤 Начать</button>
                <button onclick="closeVoicePanel()" id="voiceCloseBtn">✖️ Закрыть</button>
            </div>
            <div id="voiceResult" class="voice-result"></div>
            <div id="voiceHelpText" class="voice-help">📌 Скажите: "Иванов 85" или "Петров 90" или "всем 75"</div>
        </div>
    </div>

    <!-- Модальные окна (структура та же) -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="groupModalTitle">➕ Создать новую группу</h3>
                <span class="close" onclick="closeGroupModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label id="groupNameLabel" class="modal-label">Название группы:</label>
                <input type="text" id="groupName" class="modal-input">
            </div>
            <div class="modal-footer">
                <button onclick="closeGroupModal()" id="groupCancelBtn">Отмена</button>
                <button onclick="saveGroup()" id="groupModalBtn" class="excel-btn">➕ Создать</button>
            </div>
        </div>
    </div>

    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="addStudentTitle">➕ Добавить нового студента</h3>
                <span class="close" onclick="closeAddStudentModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label id="studentNameLabel" class="modal-label">ФИО Студента:</label>
                <input type="text" id="newStudentName" class="modal-input">
            </div>
            <div class="modal-footer">
                <button onclick="closeAddStudentModal()" id="addStudentCancelBtn">Отмена</button>
                <button onclick="addStudent()" id="addStudentConfirmBtn" class="excel-btn">➕ Добавить</button>
            </div>
        </div>
    </div>

    <div id="editStudentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="editStudentTitle">✏️ Редактировать студента</h3>
                <span class="close" onclick="closeEditStudentModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label id="editStudentNameLabel" class="modal-label">ФИО Студента:</label>
                <input type="text" id="editStudentName" class="modal-input">
            </div>
            <div class="modal-footer">
                <button onclick="deleteStudent()" id="deleteStudentBtn" class="reset-btn" style="margin-right: auto;">🗑️ Удалить</button>
                <button onclick="closeEditStudentModal()" id="editStudentCancelBtn">Отмена</button>
                <button onclick="updateStudent()" id="editStudentSaveBtn" class="excel-btn">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <div id="instructionsModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="instructionsTitle">📖 Полная инструкция</h3>
                <span class="close" onclick="closeInstructions()">&times;</span>
            </div>
            <div style="padding: 20px; max-height: 70vh; overflow-y: auto;" id="instructionsContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
